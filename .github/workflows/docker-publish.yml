name: Docker Publish

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    # myskillsリポジトリの内容を読み取る権限を付与
    permissions:
      contents: read
    
    env:
      IMAGE_NAME: mrmapleleaf/myskills
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          # GitHubのリファレンスからタグを生成する設定
          #  - 最新のコミットがデフォルトブランチにある場合はlatestタグを付与
          #  - コミットのSHAを短縮形式でタグに付与
          #  - タグイベントの場合はそのタグを付与
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=tag
      
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          # リポジトリのルートにあるDockerfileを使用して、イメージをビルドしてDocker Hubにプッシュする設定
          context: .
          file: ./Dockerfile
          # ビルドしたイメージをDocker Hubにプッシュする設定
          push: true
          # ビルドするプラットフォームを指定する設定
          platforms: linux/amd64,linux/arm64
          # タグとラベルをmetadata-actionから取得して使用する設定
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actionsキャッシュを使ってビルド高速化。
          cache-from: type=gha
          cache-to: type=gha,mode=max